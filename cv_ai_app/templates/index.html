<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подсчёт пешеходов на переходе</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        input, button { margin: 10px 0; padding: 8px 16px; }
        #imageCanvas { border: 1px solid #ddd; max-width: 100%; cursor: crosshair; }
        #resultImage { max-width: 100%; border: 1px solid #ddd; margin-top: 10px; }
        .btn { background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 10px 20px; }
        .btn:hover { background: #2980b9; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        #stats { margin-top: 10px; font-weight: bold; }
        #reportSingle { margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Подсчёт пешеходов на пешеходном переходе</h1>
        <p>Загрузите изображение, затем <strong>отметьте область перехода</strong> (кликами мыши). После завершения разметки нажмите «Обработать».</p>

        <div>
            <input type="file" id="imageInput" accept="image/*">
            <button id="loadBtn" class="btn">Загрузить</button>
            <button id="clearPolygonBtn" class="btn btn-danger" style="display:none;">Очистить область</button>
            <button id="processBtn" class="btn" style="display:none;">Обработать</button>
        </div>

        <div>
            <canvas id="imageCanvas" width="800" height="600"></canvas>
        </div>

        <div id="result">
            <img id="resultImage" src="" alt="Результат">
            <div id="stats"></div>
            <div id="reportSingle" style="display:none; margin-top:10px;">
                <button id="reportSingleBtn" class="btn">📄 Скачать отчёт по этому изображению</button>
            </div>
        </div>

        <div>
            <button id="reportBtn" class="btn">📄 Скачать общий отчёт (по всем изображениям)</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('imageCanvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('imageInput');
        const loadBtn = document.getElementById('loadBtn');
        const processBtn = document.getElementById('processBtn');
        const clearPolygonBtn = document.getElementById('clearPolygonBtn');
        const resultImage = document.getElementById('resultImage');
        const statsDiv = document.getElementById('stats');
        const reportBtn = document.getElementById('reportBtn');
        const reportSingleBtn = document.getElementById('reportSingleBtn');
        const reportSingleDiv = document.getElementById('reportSingle');

        let currentImage = null;
        let polygonPoints = [];
        let imageLoaded = false;
        let currentRecordId = null;   // для хранения ID текущей записи

        // Загрузка изображения
        loadBtn.addEventListener('click', function() {
            const file = fileInput.files[0];
            if (!file) {
                alert('Выберите изображение');
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const maxWidth = 800;
                    const maxHeight = 600;
                    let width = img.width;
                    let height = img.height;
                    if (width > maxWidth) {
                        height = height * maxWidth / width;
                        width = maxWidth;
                    }
                    if (height > maxHeight) {
                        width = width * maxHeight / height;
                        height = maxHeight;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    currentImage = img;
                    imageLoaded = true;
                    polygonPoints = [];
                    clearPolygonBtn.style.display = 'none';
                    processBtn.style.display = 'none';
                    resultImage.src = '';
                    statsDiv.innerHTML = '';
                    reportSingleDiv.style.display = 'none';   // скрываем кнопку отчёта по одному
                    currentRecordId = null;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });

        // Клик по canvas – добавление точки полигона
        canvas.addEventListener('click', function(e) {
            if (!imageLoaded) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            const x_rel = x / canvas.width;
            const y_rel = y / canvas.height;
            polygonPoints.push({x_rel, y_rel});
            drawCanvas();
            if (polygonPoints.length >= 3) {
                processBtn.style.display = 'inline-block';
                clearPolygonBtn.style.display = 'inline-block';
            } else {
                processBtn.style.display = 'none';
            }
        });

        // Очистка полигона
        clearPolygonBtn.addEventListener('click', function() {
            polygonPoints = [];
            drawCanvas();
            processBtn.style.display = 'none';
            clearPolygonBtn.style.display = 'none';
            reportSingleDiv.style.display = 'none';
            currentRecordId = null;
        });

        // Отрисовка canvas
        function drawCanvas() {
            if (!currentImage) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);
            if (polygonPoints.length === 0) return;

            const pts = polygonPoints.map(p => ({
                x: p.x_rel * canvas.width,
                y: p.y_rel * canvas.height
            }));

            ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length; i++) {
                ctx.lineTo(pts[i].x, pts[i].y);
            }
            if (pts.length >= 3) {
                ctx.closePath();
                ctx.fillStyle = 'rgba(0, 255, 0, 0.2)';
                ctx.fill();
                ctx.strokeStyle = 'green';
                ctx.lineWidth = 2;
                ctx.stroke();
            } else {
                ctx.strokeStyle = 'red';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            pts.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, 2 * Math.PI);
                ctx.fillStyle = 'red';
                ctx.fill();
            });
        }

        // Обработка изображения
        processBtn.addEventListener('click', async function() {
            if (!imageLoaded || polygonPoints.length < 3) {
                alert('Загрузите изображение и отметьте область перехода (минимум 3 точки)');
                return;
            }
            const file = fileInput.files[0];
            if (!file) {
                alert('Файл не выбран');
                return;
            }

            const formData = new FormData();
            formData.append('image', file);
            const poly = polygonPoints.map(p => [p.x_rel, p.y_rel]);
            formData.append('polygon', JSON.stringify(poly));

            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (!response.ok) {
                    alert('Ошибка: ' + (data.error || 'Неизвестная ошибка'));
                    return;
                }
                resultImage.src = data.result_url + '?' + new Date().getTime();
                statsDiv.innerHTML = `
                    <p>Всего людей на изображении: <strong>${data.total_people}</strong></p>
                    <p>Людей на переходе: <strong>${data.on_crosswalk}</strong></p>
                    <p>Обнаруженные классы: ${data.classes.join(', ')}</p>
                `;

                // ---- НОВОЕ: работа с отчётом по конкретной записи ----
                if (data.record_id) {
                    currentRecordId = data.record_id;
                    reportSingleDiv.style.display = 'block';
                } else {
                    reportSingleDiv.style.display = 'none';
                }
            } catch (err) {
                alert('Ошибка соединения с сервером');
            }
        });

        // Отчёт по одному изображению
        reportSingleBtn.addEventListener('click', function() {
            if (currentRecordId) {
                window.open(`/report/${currentRecordId}`, '_blank');
            } else {
                alert('Сначала обработайте изображение');
            }
        });

        // Общий отчёт
        reportBtn.addEventListener('click', function() {
            window.open('/report', '_blank');
        });
    </script>
</body>
</html>
